    <!-- Cria um card estilizado com Angular Material -->
    <mat-card class="fundo1">

        <!-- Título do card: aparece no topo com estilo -->
        <div style="display: flex; justify-content: flex-end;">
        <mat-card-title>Novo Produto</mat-card-title>
        </div>
        <!-- Início do formulário de cadastro -->
        <form>

            <!-- Campo de formulário com estilização do Angular Material -->
            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome do produto -->
                <input matInput placeholder="Nome" [(ngModel)]="product.proNome" name="proNome">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome da Descrição -->
                <input matInput placeholder="Descrição" [(ngModel)]="product.proDescricao" name="proDescricao">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome da Categoria -->
                <input matInput placeholder="Categoria" [(ngModel)]="product.proCategoria" name="proCategoria">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome da Estoque -->
                <input matInput type="number" placeholder="Estoque" [(ngModel)]="product.proEstoque" name="proEstoque">
            </mat-form-field>

        

            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome da Codigo de Barras -->
                <input matInput placeholder="Codigo de Barra" [(ngModel)]="product.proCodigoBarra" name="proCodigoBarra">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome da Aplicação -->
                <input matInput placeholder="Aplicação" [(ngModel)]="product.proAplicacao" name="proAplicacao">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome da Marca -->
                <input matInput placeholder="Marca" [(ngModel)]="product.proMarca" name="proMarca">
            </mat-form-field>

            <mat-form-field>
                <mat-label>Produto Ativo?</mat-label>
                <mat-select [(ngModel)]="product.proStatus" name="ativo">
                <mat-option [value]="true">Sim</mat-option>
                <mat-option [value]="false">Não</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o preço de custo -->
                <input matInput type="number" placeholder="Preco de Custo (R$)" [(ngModel)]="product.proPrecoCusto" name="proPrecoCusto">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o preço de venda -->
                <input matInput type="number" placeholder="Preco de Venda (R$)" [(ngModel)]="product.proPrecoVenda" name="proPrecoVenda">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <!-- Campo de input para o nome da Fabricante -->
                <input matInput placeholder="Fabricante" [(ngModel)]="product.proFabricante" name="proFabricante">
            </mat-form-field>

            <mat-form-field>
                <input matInput [matDatepicker]="picker1" placeholder="Data de Cadastro" [(ngModel)]="product.proDataCadastro" name="proDataCadastro">
                <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
                <mat-datepicker #picker1></mat-datepicker>
            </mat-form-field>


        </form>
        <mat-card class="fundo1">

            <!-- Título do card -->
            <div style="display: flex; justify-content: flex-end;"> <!-- linha que faz ir pra direita-->
                <mat-card-title>Novo Produto</mat-card-title>
              </div>                                                 <!-- linha que faz ir pra direita-->
          
            <!-- Formulário de cadastro -->
            <form>
              <!-- Campos do formulário aqui -->
            </form>
          
            <!-- Container dos botões alinhado à direita -->
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
              <button mat-raised-button (click)="createProduct()" color="primary">
                Salvar
              </button>
          
              <button mat-raised-button (click)="cancel()">
                Cancelar
              </button>
            </div>
          </mat-card>
